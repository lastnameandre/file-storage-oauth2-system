<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>My Files</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            margin: 40px;
        }
        h1 {
            margin-bottom: 20px;
        }
        table {
            border-collapse: collapse;
            width: 100%;
            margin-top: 20px;
        }

        th, td {
            border: 1px solid #ccc;
            padding: 10px;
            text-align: left;
        }

        th {
            background-color: #f5f5f5;
        }

        .actions {
            display: flex;
            gap: 10px;
        }

        button {
            padding: 5px 10px;
            cursor: pointer;
        }

        .upload-form {
            margin-bottom: 20px;
        }
    </style>
</head>
<body>
<div th:if="${shareLink}">
    <p>🔗 Share link:</p>
    <a th:href="${shareLink}" th:text="${shareLink}" target="_blank"></a>
</div>
<h1>📁 My Files</h1>

<form class="upload-form" method="post" enctype="multipart/form-data" action="/files/upload">
    <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>
    <input type="file" name="file" required>
    <button type="submit">Upload</button>
</form>

<table>
    <thead>
    <tr>
        <th>ID</th>
        <th>Name</th>
        <th>Size</th>
        <th>Actions</th>
    </tr>
    </thead>
    <tbody>
    <tr th:each="file : ${files}">
        <td th:text="${file.id}"></td>
        <td th:text="${file.fileName}"></td>
        <td th:text="${file.size} + ' bytes'"></td>
        <td class="actions">

            <a th:href="@{'/files/download/' + ${file.id}}">
                <button type="button">Download</button>
            </a>

            <form th:action="@{'/files/delete/' + ${file.id}}" method="post">
                <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>
                <button type="submit">Delete</button>
            </form>

            <form th:action="@{'/files/share/' + ${file.id}}" method="post">
                <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>
                <button type="submit">Share</button>
            </form>

        </td>
    </tr>
    </tbody>
</table>

</body>
</html>
